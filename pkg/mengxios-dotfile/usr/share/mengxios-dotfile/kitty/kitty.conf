# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# 标签页
tab_bar_edge top
tab_bar_style fade


cursor_trail 1

editor nvim
shell fish

# env
env EDITOR=nvim

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# 标签页
tab_bar_edge top
tab_bar_style fade


cursor_trail 1

editor nvim
shell fish

# env
env EDITOR=nvim

# BEGIN_KITTY_THEME
# Noctalia
# END_KITTY_THEME
# --- 核心毛玻璃效果配置 ---

# 1.设置背景透明度 (0.0 完全透明, 1.0 完全不透明)
#    推荐值在 0.5 到 0.9 之间，以便让模糊效果更明显
background_opacity 0.8

# 2.设置背景模糊半径 (数值越大，模糊程度越高)
#    这是实现毛玻璃效果的关键，从 Kitty 0.29.0 版本开始支持
background_blur 30

# 3.添加背景色调，可以让背景颜色更深，提高文字对比度
#    值范围 0.0 到 1.0，0.0 表示无色调
background_tint 0.2

# 4.为非活动窗口设置不同的透明度
inactive_opacity 0.7
# 透明度设置
background_opacity 0.75
background_blur 48

# 颜色配置
background #0c1f2b
foreground #d4f0ff

# 黑色
color0 #1d3a47
color8 #2b5566

# 红色
color1 #ff5f87
color9 #ff7f9f

# 绿色
color2  #87d7af
color10 #a7e7cf

# 黄色
color3  #ffd787
color11 #ffe7a7

# 蓝色
color4  #8aafff
color12 #aacfff

# 紫色
color5  #d7afff
color13 #e7cfff

# 青色
color6  #9fe0f0
color14 #bff0ff

# 白色
color7  #e0f0ff
color15 #f0faff

# 选择区域颜色
selection_background #2d6075
selection_foreground #f0faff

# 光标颜色
cursor #b0e8ff
cursor_text_color #0c1f2b

# 链接颜色
url_color #6cb8ff

# 标记颜色（搜索高亮等）
mark1_background #2d6075
mark1_foreground #f0faff
# 光标闪烁效果
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# 让提示符更有"玻璃"质感
shell_integration enabled

# 边框效果
window_margin_width 2
window_padding_width 5
draw_minimal_borders yes
active_border_color #4f9eb3
inactive_border_color #1e3f4a
